<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Deck title</title>
<style>
  /* ── Tokens ─────────────────────────────────────────────────────────────
     Copied from source/brand/tokens.css at build time so the deck stays a
     single self-contained file. When brand tokens change, refresh this block
     in decks that are still in active use. */
  :root {
    --color-bg: #faf9f7;
    --color-surface: #ffffff;
    --color-ink: #1a1a1a;
    --color-muted: #6b6b6b;
    --color-line: #e3e0da;
    --color-accent: #1a3a2e;
    --color-accent-ink: #faf9f7;
    --font-display: ui-serif, Georgia, serif;
    --font-text: system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  /* ── Engine (don't edit casually) ──────────────────────────────────────
     Fixed 1280×720 canvas, scaled to fit the window. One .slide per slide. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--color-ink); }
  body { font-family: var(--font-text); color: var(--color-ink); overflow: hidden; }
  #stage {
    position: absolute; top: 50%; left: 50%;
    width: 1280px; height: 720px;
    transform: translate(-50%, -50%) scale(var(--deck-scale, 1));
  }
  .slide {
    position: absolute; inset: 0; padding: 72px 88px;
    background: var(--color-bg);
    display: none; flex-direction: column; justify-content: center;
  }
  .slide.active { display: flex; }
  #counter {
    position: fixed; right: 16px; bottom: 12px;
    font-family: var(--font-text); font-size: 13px; color: var(--color-muted);
    user-select: none; z-index: 2;
  }

  /* ── Slide typography and layouts (edit freely, tokens only) ─────────── */
  .slide h1 { font-family: var(--font-display); font-size: 64px; line-height: 1.1; max-width: 20ch; }
  .slide h2 { font-family: var(--font-display); font-size: 44px; line-height: 1.15; max-width: 24ch; }
  .slide p  { font-size: 26px; line-height: 1.45; max-width: 44ch; color: var(--color-ink); }
  .slide .kicker { font-size: 18px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-accent); margin-bottom: 24px; }
  .slide .note { font-size: 16px; color: var(--color-muted); position: absolute; bottom: 48px; left: 88px; }
  .slide h1 + p, .slide h2 + p { margin-top: 32px; }
  .slide.cover { background: var(--color-accent); }
  .slide.cover h1, .slide.cover p { color: var(--color-accent-ink); }
  .slide.cover .kicker { color: var(--color-accent-ink); opacity: 0.7; }

  /* ── Print: one page per slide ─────────────────────────────────────────── */
  @media print {
    html, body { background: none; overflow: visible; }
    #stage { position: static; width: auto; height: auto; transform: none; }
    .slide { display: flex; position: relative; inset: auto; width: 1280px; height: 720px; page-break-after: always; }
    #counter { display: none; }
    @page { size: 1280px 720px; margin: 0; }
  }
</style>
</head>
<body>

<div id="stage">

  <section class="slide cover">
    <p class="kicker">Occasion · date</p>
    <h1>Deck title</h1>
    <p>One line on what this deck is about.</p>
  </section>

  <section class="slide">
    <p class="kicker">Section</p>
    <h2>A statement slide carries one idea</h2>
    <p>Supporting line, short. The speaker carries the detail.</p>
  </section>

  <section class="slide">
    <h2>Thank you</h2>
    <p class="note">contact · site</p>
  </section>

</div>

<div id="counter"></div>

<script>
  // Slide engine: arrows/space/click to navigate, hash deep-links (#3), scale to fit.
  const slides = Array.from(document.querySelectorAll('.slide'));
  const counter = document.getElementById('counter');
  let i = Math.min(Math.max((parseInt(location.hash.slice(1), 10) || 1) - 1, 0), slides.length - 1);

  function show(n) {
    i = Math.min(Math.max(n, 0), slides.length - 1);
    slides.forEach((s, k) => s.classList.toggle('active', k === i));
    counter.textContent = (i + 1) + ' / ' + slides.length;
    history.replaceState(null, '', '#' + (i + 1));
  }
  function fit() {
    const s = Math.min(innerWidth / 1280, innerHeight / 720);
    document.documentElement.style.setProperty('--deck-scale', s);
  }

  addEventListener('keydown', (e) => {
    if (['ArrowRight', 'ArrowDown', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); show(i + 1); }
    if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); show(i - 1); }
    if (e.key === 'Home') show(0);
    if (e.key === 'End') show(slides.length - 1);
  });
  addEventListener('click', (e) => show(e.clientX > innerWidth / 2 ? i + 1 : i - 1));
  addEventListener('resize', fit);
  addEventListener('hashchange', () => show((parseInt(location.hash.slice(1), 10) || 1) - 1));

  fit();
  show(i);
</script>
</body>
</html>
